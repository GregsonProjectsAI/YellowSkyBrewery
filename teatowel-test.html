<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tea Towel — WebGPU Test</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: #1a1208;
            font-family: Georgia, serif;
        }

        /* Background image — same as Slide 1 */
        #bg {
            position: fixed;
            inset: 0;
            background-image: url('assets/stacked_grain_bags.jpeg');
            background-size: cover;
            background-position: center;
            z-index: 0;
        }

        /* WebGPU cloth container — the renderer injects its canvas here */
        #cloth-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* WebGL fallback: show static tea towel image */
        #fallback {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
        }
        #fallback img {
            max-height: 72vh;
            max-width: 80vw;
            object-fit: contain;
            filter: drop-shadow(0 8px 32px rgba(0,0,0,0.6));
        }
        #fallback p {
            font-size: 0.75rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: rgba(255,215,100,0.6);
        }

        /* Grab hint */
        #cloth-hint {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            text-align: center;
            transition: opacity 0.6s ease;
        }
        #cloth-hint.visible { opacity: 1; }
        .cloth-hint__icon { font-size: 1.6rem; display: block; margin-bottom: 6px; }
        .cloth-hint__text {
            display: inline-block;
            font-size: 0.78rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(255, 215, 100, 0.9);
            background: rgba(0,0,0,0.45);
            border: 1px solid rgba(255,215,100,0.3);
            border-radius: 20px;
            padding: 7px 22px;
        }

        /* Status chip — top-left */
        #status {
            position: fixed;
            top: 12px;
            left: 16px;
            z-index: 20;
            font-size: 0.7rem;
            letter-spacing: 0.05em;
            color: rgba(255,255,255,0.45);
            pointer-events: none;
        }

        /* Version badge */
        #version {
            position: fixed;
            top: 12px;
            right: 16px;
            z-index: 20;
            font-size: 0.68rem;
            letter-spacing: 0.05em;
            color: rgba(255,215,100,0.4);
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="bg"></div>

    <!-- WebGPU cloth renderer mounts its canvas here -->
    <div id="cloth-container"></div>

    <!-- Shown only when WebGPU is unavailable -->
    <div id="fallback">
        <img src="assets/YSB_TeaTowel_Modified_with_border.png" alt="Yellow Sky Brewery Tea Towel">
        <p>Interactive cloth requires a WebGPU-capable browser</p>
    </div>

    <div id="cloth-hint">
        <span class="cloth-hint__icon">✋</span>
        <span class="cloth-hint__text">Grab &amp; drag the towel</span>
    </div>

    <div id="status">⏳ Initialising…</div>
    <div id="version">Three.js r184 · WebGPU</div>

    <script type="importmap">
    {
        "imports": {
            "three":         "/node_modules/three/build/three.webgpu.js",
            "three/webgpu":  "/node_modules/three/build/three.webgpu.js",
            "three/tsl":     "/node_modules/three/build/three.tsl.js",
            "three/addons/": "/node_modules/three/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import { init, start } from '/js/teatowel-webgpu.js?v=2';

        const container = document.getElementById('cloth-container');
        const fallback  = document.getElementById('fallback');
        const hint      = document.getElementById('cloth-hint');
        const status    = document.getElementById('status');

        async function bootstrap() {
            const ok = await init(container, 'assets/YSB_TeaTowel_Modified_with_border.png');

            if (!ok) {
                // WebGPU not available — show static image
                fallback.style.display = 'flex';
                status.textContent = '⚠️ WebGPU unavailable — showing static image';
                return;
            }

            start();
            status.textContent = '✅ WebGPU cloth running';

            // Show grab hint after a short settle time
            setTimeout(() => hint.classList.add('visible'), 1800);
        }

        bootstrap().catch(err => {
            console.error('Tea towel init failed:', err);
            status.textContent = '❌ ' + err.message;
            fallback.style.display = 'flex';
        });
    </script>

</body>
</html>

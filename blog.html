<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Yellow Sky Bulletin - Blog Archive</title>
    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/main.css">
    <style>
        /* Specific Styles for Archive Page */
        body {
            background-color: var(--color-bg-dark);
            color: var(--color-text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .archive-header {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background-color: rgba(13, 13, 13, 0.8);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 15px 0;
        }

        .archive-header__container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .archive-brand {
            display: flex;
            align-items: center;
            gap: 15px;
            text-decoration: none;
            color: var(--color-text-light);
        }

        .archive-brand__logo {
            height: 50px;
            width: auto;
        }

        .archive-brand__name {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--color-brand-primary);
        }

        .archive-hero {
            padding: 60px 0 30px;
            text-align: center;
        }

        .archive-title {
            font-size: 42px;
            color: var(--color-text-light);
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .archive-title span {
            color: var(--color-brand-primary);
        }

        .archive-subtitle {
            font-size: 16px;
            color: var(--color-text-muted);
            max-width: 600px;
            margin: 0 auto;
        }

        /* Filter Controls */
        .filter-section {
            padding: 20px 0 40px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--color-text-light);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .filter-btn:hover {
            border-color: var(--color-brand-primary);
            background-color: rgba(212, 175, 55, 0.05);
            transform: translateY(-2px);
        }

        .filter-btn.active {
            background-color: var(--color-brand-primary);
            color: var(--color-bg-dark);
            border-color: var(--color-brand-primary);
            box-shadow: var(--shadow-glow);
        }

        /* Archive Grid Layout */
        .archive-content {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto 80px;
            width: 100%;
            padding: 0 20px;
        }

        .archive-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 30px;
            transition: opacity 0.3s ease;
        }

        /* Smooth fade transition when filtering */
        .archive-grid.filtering {
            opacity: 0;
        }

        .archive-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding: 40px 0;
            text-align: center;
            background-color: var(--color-bg-darker);
            margin-top: auto;
        }

        .archive-footer__text {
            color: var(--color-text-muted);
            font-size: 14px;
        }

        /* Empty states */
        .archive-empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px dashed rgba(255, 255, 255, 0.1);
            border-radius: 12px;
        }

        .archive-empty-state p {
            color: var(--color-text-muted);
            font-size: 16px;
        }

        @media (max-width: 768px) {
            .archive-title {
                font-size: 32px;
            }
            .archive-grid {
                grid-template-columns: 1fr;
            }
            .archive-brand__name {
                display: none; /* Hide text name on small mobile to fit back button */
            }
        }
    </style>
</head>
<body>

    <!-- Backdrop -->
    <div class="page-backdrop" style="opacity: 0.15;"></div>

    <!-- Header Navigation -->
    <header class="archive-header">
        <div class="archive-header__container">
            <a href="index.html" class="archive-brand">
                <img src="assets/beer branding and names/transparent_logo.png" alt="Yellow Sky Brewery Logo" class="archive-brand__logo">
                <span class="archive-brand__name">Yellow Sky Brewery</span>
            </a>
            <a href="index.html" class="btn btn--secondary" style="border-radius: 30px; font-size: 14px; padding: 8px 20px;">
                &larr; Back to Brewery
            </a>
        </div>
    </header>

    <!-- Main Container -->
    <main class="archive-content">
        <!-- Hero Section -->
        <section class="archive-hero">
            <h1 class="archive-title">The Yellow Sky <span>Bulletin</span></h1>
            <p class="archive-subtitle">Keep up to speed with our latest brew logs, upcoming events, and general updates from the sheds.</p>
        </section>

        <!-- Filters Section -->
        <section class="filter-section">
            <button class="filter-btn active" data-filter="all">All Updates</button>
            <button class="filter-btn" data-filter="brew-log">Brew Logs 🍺</button>
            <button class="filter-btn" data-filter="event">Events 📅</button>
            <button class="filter-btn" data-filter="general">General Updates 📝</button>
        </section>

        <!-- Grid Feed Section -->
        <section>
            <div id="archive-grid-feed" class="archive-grid">
                <div style="grid-column: 1 / -1; text-align: center; padding: 40px; color: var(--color-text-muted);">
                    Loading Bulletin Archive...
                </div>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="archive-footer">
        <div class="archive-footer__container">
            <p class="archive-footer__text">&copy; 2026 Yellow Sky Brewery. Handcrafted by Three Nitwits.</p>
        </div>
    </footer>

    <!-- JS Archive Engine -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const feedContainer = document.getElementById('archive-grid-feed');
            const filterBtns = document.querySelectorAll('.filter-btn');
            
            let allPosts = [];
            let currentFilter = 'all';

            // Fetch posts on load
            fetch('/api/posts')
                .then(response => {
                    if (!response.ok) throw new Error('Network error');
                    return response.json();
                })
                .then(data => {
                    allPosts = data.posts || [];
                    renderPosts();
                })
                .catch(error => {
                    console.error('Error loading posts:', error);
                    feedContainer.innerHTML = `
                        <div class="archive-empty-state">
                            <p style="color: var(--color-error);">Error loading archive. Please try refreshing the page later.</p>
                        </div>
                    `;
                });

            // Filters logic
            filterBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    const filter = btn.getAttribute('data-filter');
                    if (filter === currentFilter) return;

                    // Sync buttons
                    filterBtns.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    currentFilter = filter;

                    // Smooth transition when filtering
                    feedContainer.classList.add('filtering');
                    setTimeout(() => {
                        renderPosts();
                        feedContainer.classList.remove('filtering');
                    }, 200);
                });
            });

            // Render matching posts
            function renderPosts() {
                const filteredPosts = currentFilter === 'all' 
                    ? allPosts 
                    : allPosts.filter(p => p.type === currentFilter);

                if (filteredPosts.length === 0) {
                    feedContainer.innerHTML = `
                        <div class="archive-empty-state">
                            <p>No matching updates found in this category.</p>
                        </div>
                    `;
                    return;
                }

                feedContainer.innerHTML = '';
                filteredPosts.forEach(post => {
                    const card = document.createElement('article');
                    card.className = `blog-card blog-card--${post.type} is-visible`;

                    const createdDate = new Date(post.createdAt);
                    const formattedDate = createdDate.toLocaleDateString('en-GB', {
                        day: 'numeric',
                        month: 'short',
                        year: 'numeric'
                    });

                    let cardContent = '';

                    if (post.type === 'brew-log') {
                        const brewDate = post.brewDate ? new Date(post.brewDate).toLocaleDateString('en-GB', {
                            day: 'numeric',
                            month: 'short',
                            year: 'numeric'
                        }) : 'N/A';

                        cardContent = `
                            <div class="blog-card__header">
                                <span class="blog-badge blog-badge--brew-log">Brew Log 🍺</span>
                                <span class="blog-card__date">${formattedDate}</span>
                            </div>
                            <h3 class="blog-card__title">${escapeHTML(post.beerName)}</h3>
                            <div class="blog-card__meta-grid">
                                <div class="blog-card__meta-item">
                                    <span class="blog-card__meta-label">Style:</span>
                                    <span class="blog-card__meta-value">${escapeHTML(post.style)}</span>
                                </div>
                                <div class="blog-card__meta-item">
                                    <span class="blog-card__meta-label">Batch:</span>
                                    <span class="blog-card__meta-value">${escapeHTML(post.batchNumber)}</span>
                                </div>
                                <div class="blog-card__meta-item">
                                    <span class="blog-card__meta-label">Brewed:</span>
                                    <span class="blog-card__meta-value">${brewDate}</span>
                                </div>
                                ${post.yeast ? `
                                <div class="blog-card__meta-item">
                                    <span class="blog-card__meta-label">Yeast:</span>
                                    <span class="blog-card__meta-value">${escapeHTML(post.yeast)}</span>
                                </div>` : ''}
                                ${post.originalGravity ? `
                                <div class="blog-card__meta-item">
                                    <span class="blog-card__meta-label">OG:</span>
                                    <span class="blog-card__meta-value">${escapeHTML(post.originalGravity)}</span>
                                </div>` : ''}
                                ${post.finalGravity ? `
                                <div class="blog-card__meta-item">
                                    <span class="blog-card__meta-label">FG:</span>
                                    <span class="blog-card__meta-value">${escapeHTML(post.finalGravity)}</span>
                                </div>` : ''}
                            </div>
                            ${post.grainBill ? `
                            <div style="margin-top: 15px; font-size: 13px;">
                                <strong>Grain Bill:</strong><br>
                                <p style="color: var(--color-text-muted); white-space: pre-wrap; font-family: inherit; margin-top: 4px;">${escapeHTML(post.grainBill)}</p>
                            </div>` : ''}
                            ${post.hops ? `
                            <div style="margin-top: 15px; font-size: 13px;">
                                <strong>Hops Schedule:</strong><br>
                                <p style="color: var(--color-text-muted); white-space: pre-wrap; font-family: inherit; margin-top: 4px;">${escapeHTML(post.hops)}</p>
                            </div>` : ''}
                            ${post.brewDayNotes ? `
                            <div class="blog-card__snippet-box">
                                <h4 class="blog-card__snippet-title">Brew Day Notes:</h4>
                                <p class="blog-card__snippet-text" style="-webkit-line-clamp: unset; max-height: none;">${escapeHTML(post.brewDayNotes)}</p>
                            </div>` : ''}
                            ${post.tastingNotes ? `
                            <div class="blog-card__snippet-box blog-card__snippet-box--tasting">
                                <h4 class="blog-card__snippet-title">Tasting Notes:</h4>
                                <p class="blog-card__snippet-text" style="-webkit-line-clamp: unset; max-height: none;">${escapeHTML(post.tastingNotes)}</p>
                            </div>` : ''}
                        `;
                    } else if (post.type === 'event') {
                        const eventDateTime = post.eventDateTime ? new Date(post.eventDateTime).toLocaleString('en-GB', {
                            weekday: 'short',
                            day: 'numeric',
                            month: 'short',
                            year: 'numeric',
                            hour: '2-digit',
                            minute: '2-digit'
                        }) : 'N/A';

                        cardContent = `
                            <div class="blog-card__header">
                                <span class="blog-badge blog-badge--event">Event 📅</span>
                                <span class="blog-card__date">${formattedDate}</span>
                            </div>
                            <h3 class="blog-card__title">${escapeHTML(post.eventName)}</h3>
                            <div class="blog-card__details">
                                <div class="blog-card__detail-row">
                                    <svg class="blog-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a10 10 0 0 0-10 10c0 5.25 10 12 10 12s10-6.75 10-12a10 10 0 0 0-10-10z"/><circle cx="12" cy="10" r="3"/></svg>
                                    <span><strong>Venue:</strong> ${escapeHTML(post.venue)}</span>
                                </div>
                                <div class="blog-card__detail-row">
                                    <svg class="blog-card__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                                    <span><strong>When:</strong> ${eventDateTime}</span>
                                </div>
                            </div>
                            <p class="blog-card__body">${escapeHTML(post.description)}</p>
                            ${post.ticketLink ? `
                            <a href="${escapeHTML(post.ticketLink)}" target="_blank" rel="noopener noreferrer" class="blog-card__btn-tickets">
                                Get Tickets &rarr;
                            </a>` : ''}
                        `;
                    } else {
                        // General post
                        const tagList = post.tags ? post.tags.split(',').map(t => t.trim()).filter(t => t.length > 0) : [];
                        
                        cardContent = `
                            <div class="blog-card__header">
                                <span class="blog-badge blog-badge--general">Update 📝</span>
                                <span class="blog-card__date">${formattedDate}</span>
                            </div>
                            <h3 class="blog-card__title">${escapeHTML(post.title)}</h3>
                            <p class="blog-card__body">${escapeHTML(post.body)}</p>
                            ${tagList.length > 0 ? `
                            <div class="blog-card__tags">
                                ${tagList.map(tag => `<span class="blog-card__tag">#${escapeHTML(tag)}</span>`).join('')}
                            </div>` : ''}
                        `;
                    }

                    card.innerHTML = cardContent;
                    feedContainer.appendChild(card);
                });
            }

            // Helper functions
            function escapeHTML(str) {
                return str ? str.replace(/[&<>'"]/g, 
                    tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
                ) : '';
            }
        });
    </script>
</body>
</html>

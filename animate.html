<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animated Image</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #0d0d0d;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: sans-serif;
        }
        
        .image-container {
            width: 90%;
            height: 90%;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
        }

        .animated-image {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            border-radius: 16px;
            animation: dynamic-animation 8s cubic-bezier(0.4, 0, 0.2, 1) infinite alternate;
            transform-style: preserve-3d;
        }

        @keyframes dynamic-animation {
            0% {
                transform: scale(0.9) rotateY(-10deg) rotateX(5deg) translateY(0);
                box-shadow: -15px 15px 30px rgba(0, 0, 0, 0.8), 0 0 20px rgba(255, 200, 50, 0.2);
            }
            50% {
                transform: scale(1.05) rotateY(10deg) rotateX(-5deg) translateY(-20px);
                box-shadow: 15px 25px 40px rgba(0, 0, 0, 0.9), 0 0 40px rgba(255, 100, 200, 0.4);
            }
            100% {
                transform: scale(1) rotateY(0deg) rotateX(0deg) translateY(10px);
                box-shadow: 0 15px 30px rgba(0, 0, 0, 0.8), 0 0 60px rgba(100, 200, 255, 0.5);
            }
        }
    </style>
</head>
<body>
    <div class="image-container">
        <img src="assets/beer branding and names/WhatsApp Image 2026-04-23 at 15.20.43.3.jpeg" class="animated-image" alt="Animated Beer Branding">
    </div>
</body>
</html>
